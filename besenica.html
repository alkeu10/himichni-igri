<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Химични игри | Бесеница</title>
    <link rel="stylesheet" href="besenica.css">
    <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap" rel="stylesheet">
</head>
<body>

    <a href="index.html" class="back-button">
        <img src="images/glyphs_arrow-bold.svg" alt="Назад">
    </a>

    <main class="game-container">
        <section class="top-section">
            <div class="word-info">
                <h1 class="game-title">БЕСЕНИЦА</h1>
                <div id="word-display" class="word-display">
                    <!-- Letters generated by JS -->
                </div>
            </div>

            <div class="hangman-container">
                <svg class="hangman-svg" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                    <g stroke="#070707" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <line id="g-base" class="part" x1="10" y1="110" x2="90" y2="110" style="opacity: 1; transition: 0.3s;"/>
                        <line id="g-pole" class="part" x1="30" y1="110" x2="30" y2="10" style="opacity: 1; transition: 0.3s;"/>
                        <line id="g-beam" class="part" x1="30" y1="10" x2="75" y2="10" style="opacity: 1; transition: 0.3s;"/>
                        <line id="g-rope" class="part" x1="75" y1="10" x2="75" y2="25" style="opacity: 1; transition: 0.3s;"/>
                        <circle id="head" class="part" cx="75" cy="37" r="10" style="opacity: 1; transition: 0.3s;"/>
                        <line id="body" class="part" x1="75" y1="47" x2="75" y2="80" style="opacity: 1; transition: 0.3s;"/>
                        <line id="l-arm" class="part" x1="75" y1="55" x2="55" y2="70" style="opacity: 1; transition: 0.3s;"/>
                        <line id="r-arm" class="part" x1="75" y1="55" x2="95" y2="70" style="opacity: 1; transition: 0.3s;"/>
                        <line id="l-leg" class="part" x1="75" y1="80" x2="60" y2="100" style="opacity: 1; transition: 0.3s;"/>
                        <line id="r-leg" class="part" x1="75" y1="80" x2="90" y2="100" style="opacity: 1; transition: 0.3s;"/>
                    </g>
                </svg>
</div>
        </section>

        <section class="keyboard-section">
            <div id="keyboard" class="keyboard">
                <!-- Buttons generated by JS -->
            </div>
        </section>

        <div id="game-modal" class="modal">
            <div class="modal-content">
                <h2 id="modal-title">Край на играта!</h2>
                <p id="modal-message"></p>
                    <div class="modal-buttons">
                        <button onclick="location.reload()" class="modal-btn repeat-btn">Играй пак</button>
                        <a href="index.html" class="modal-btn home-btn">Друга игра</a>
                    </div>
            </div>
        </div>
    </main>

    <script src="besenica.js"></script>
</body>
</html>
